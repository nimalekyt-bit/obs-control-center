name: Сообщить об ошибке
description: Проблема с запуском, виджетом, OBS или интерфейсом
title: "[Ошибка]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Спасибо за отчёт. Не публикуйте пароль OBS WebSocket.
  - type: textarea
    id: problem
    attributes:
      label: Что произошло?
      description: Опишите ожидаемое и фактическое поведение.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Как повторить?
      placeholder: "1. Открыть…\n2. Нажать…\n3. Увидеть…"
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Версии
      description: Версия приложения, Windows и OBS Studio.
    validations:
      required: true
  - type: textarea
    id: report
    attributes:
      label: Диагностический отчёт
      description: Вставьте безопасный отчёт из раздела «Журнал событий».

